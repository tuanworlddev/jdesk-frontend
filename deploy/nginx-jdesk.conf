# nginx server block for the static jdesk.dev export.
# Copy to /etc/nginx/sites-available/jdesk.dev and symlink into sites-enabled.
# Run `certbot --nginx -d jdesk.dev -d www.jdesk.dev` afterwards to add HTTPS.

# Generated after every build. It maps clean routes to the hashes of the inline
# Next.js bootstrap scripts in that page, preserving a strict static CSP.
include /var/www/jdesk-frontend/out/csp-map.conf;

server {
    listen 80;
    listen [::]:80;
    server_name jdesk.dev www.jdesk.dev;

    root /var/www/jdesk-frontend/out;
    index index.html;
    server_tokens off;

    include /var/www/jdesk-frontend/deploy/security-headers.conf;

    # Redirect www -> apex (optional; certbot may adjust this).
    if ($host = www.jdesk.dev) {
        return 301 https://jdesk.dev$request_uri;
    }

    # Next static export emits `docs/introduction.html`, not a folder+index.
    # Try the exact file, then `<path>.html`, then a directory index, else 404.
    location / {
        try_files $uri $uri.html $uri/ /404.html;
    }

    # Hashed build assets are immutable — cache them hard.
    location /_next/static/ {
        include /var/www/jdesk-frontend/deploy/security-headers.conf;
        expires 1y;
        add_header Cache-Control "public, immutable";
        access_log off;
    }

    # HTML should always be revalidated.
    location ~* \.html$ {
        include /var/www/jdesk-frontend/deploy/security-headers.conf;
        add_header Cache-Control "no-cache";
    }

    error_page 404 /404.html;

    gzip on;
    gzip_types text/plain text/css application/javascript application/json image/svg+xml;
    gzip_min_length 1024;
}
