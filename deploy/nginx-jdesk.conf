# nginx reverse proxy for jdesk.dev (SSR).
#   /       -> Next.js server on :3000
#   /api/   -> NestJS API on :3001
# Copy to /etc/nginx/sites-available/jdesk.dev, symlink into sites-enabled,
# then run: certbot --nginx -d jdesk.dev -d www.jdesk.dev

upstream jdesk_web { server 127.0.0.1:3000; }
upstream jdesk_api { server 127.0.0.1:3001; }

server {
    listen 80;
    listen [::]:80;
    server_name jdesk.dev www.jdesk.dev;

    client_max_body_size 20m;

    # NestJS API (keeps the /api prefix — the backend serves under /api).
    location /api/ {
        proxy_pass http://jdesk_api;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Next.js — everything else, including its static assets and HMR upgrades.
    location / {
        proxy_pass http://jdesk_web;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Long-cache Next static chunks.
    location /_next/static/ {
        proxy_pass http://jdesk_web;
        proxy_cache_valid 200 60m;
        add_header Cache-Control "public, max-age=31536000, immutable";
    }
}
