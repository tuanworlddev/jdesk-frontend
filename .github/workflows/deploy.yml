name: CI / Deploy

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  ci:
    name: Lint & build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-node@v6
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - run: npm run lint
      - name: Build (same-origin API)
        run: NEXT_PUBLIC_API_URL=/api npm run build

  deploy:
    name: Deploy to VPS
    needs: ci
    if: github.ref == 'refs/heads/main' && github.event_name != 'pull_request'
    runs-on: ubuntu-latest
    concurrency:
      group: production-deploy
      cancel-in-progress: true
    steps:
      - name: Check deploy secrets
        id: check
        env:
          SSH_HOST: ${{ secrets.SSH_HOST }}
        run: |
          if [ -z "$SSH_HOST" ]; then
            echo "No SSH_HOST secret set — skipping deploy (configure secrets to enable)."
            echo "ready=false" >> "$GITHUB_OUTPUT"
          else
            echo "ready=true" >> "$GITHUB_OUTPUT"
          fi
      - name: Deploy over SSH (key-based)
        if: steps.check.outputs.ready == 'true'
        env:
          SSH_PRIVATE_KEY: ${{ secrets.SSH_PRIVATE_KEY }}
          SSH_HOST: ${{ secrets.SSH_HOST }}
          SSH_USER: ${{ secrets.SSH_USER }}
        run: |
          set -euo pipefail
          mkdir -p ~/.ssh
          echo "$SSH_PRIVATE_KEY" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh-keyscan -H "$SSH_HOST" >> ~/.ssh/known_hosts 2>/dev/null
          ssh -i ~/.ssh/deploy_key -o IdentitiesOnly=yes \
            "$SSH_USER@$SSH_HOST" \
            'bash /var/www/jdesk/frontend/deploy/deploy.sh'
